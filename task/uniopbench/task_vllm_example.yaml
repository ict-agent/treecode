# Example task config for running UniOpBench through a vLLM-served model.
#
# Start vLLM first:
#   python -m vllm.entrypoints.openai.api_server \
#       --model THUDM/glm-4-9b-chat --port 8000
#
# Then launch TreeCode with OpenAI-compatible model settings:
#   treecode --model glm-5.1-fp8 --api-format openai --base-url http://localhost:8000/v1 \
#     --task uniopbench --config task/uniopbench/task_vllm_example.yaml

experiment:
  name: vllm_glm5_uniopbench
  cuda_arch: sm_80
  enable_torch_compile_baseline: false

operators:
  - all

prompt:
  use_task_template: true
  extra_system: ""
  extra_user: ""

runtime:
  stop_on_first_failure: false
  keep_temp_builds: true
